#
# DDEV Provider: Coolify Production
# ==================================
#
# Pull:  ddev pull coolify          → Production DB + fileadmin → lokal
# Push:  ddev push coolify          → Lokal DB + fileadmin → Production ⚠️
#
# Voraussetzung: SSH-Key für root@kundenland.de muss im SSH-Agent sein
#   → ddev auth ssh
#
# Container werden automatisch per Coolify-Label gefunden (funktioniert auch
# nach Re-Deploys mit neuen Container-Namen).
# Das DB-Passwort wird zur Laufzeit aus dem Container geholt — kein Hardcoding.

environment_variables:
  COOLIFY_SSH: "root@kundenland.de"
  COOLIFY_APP_LABEL: "coolify.resourceName=alandolsitypo3-startermain"
  COOLIFY_DB_LABEL: "coolify.resourceName=t3-starter-mariadb-database"
  COOLIFY_DB_NAME: "default"
  COOLIFY_DB_USER: "mariadb"

auth_command:
  command: |
    set -eu -o pipefail
    ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 \
      ${COOLIFY_SSH} "echo '✅ SSH-Verbindung zu ${COOLIFY_SSH} OK'" || {
      echo ""
      echo "❌ SSH-Verbindung fehlgeschlagen!"
      echo "   Führe zuerst 'ddev auth ssh' aus um deinen SSH-Key hinzuzufügen."
      exit 1
    }

db_pull_command:
  command: |
    set -eu -o pipefail
    mkdir -p /var/www/html/.ddev/.downloads

    # Container per Coolify-Label finden (stabil über Re-Deploys hinweg)
    APP=$(ssh -o StrictHostKeyChecking=accept-new ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_APP_LABEL}'")
    DB=$(ssh ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_DB_LABEL}'")

    [ -z "$APP" ] && { echo "❌ TYPO3 App-Container nicht gefunden!"; exit 1; }
    [ -z "$DB"  ] && { echo "❌ MariaDB-Container nicht gefunden!";   exit 1; }

    echo "🔍 App-Container : $APP"
    echo "🗄️  DB-Container  : $DB"

    # DB-Passwort dynamisch aus Container-Environment holen (via docker exec env, kein Go-Template)
    DB_PASS=$(ssh ${COOLIFY_SSH} \
      "docker exec $APP env" \
      | grep '^TYPO3_DB_PASSWORD=' | cut -d= -f2-)

    [ -z "$DB_PASS" ] && { echo "❌ DB-Passwort nicht gefunden!"; exit 1; }

    echo "📤 Exportiere Production-Datenbank..."
    ssh ${COOLIFY_SSH} \
      "docker exec -e MYSQL_PWD='$DB_PASS' $DB \
        sh -c 'mariadb-dump -u${COOLIFY_DB_USER} ${COOLIFY_DB_NAME} 2>/dev/null || mysqldump -u${COOLIFY_DB_USER} ${COOLIFY_DB_NAME} 2>/dev/null'" \
      | gzip > /var/www/html/.ddev/.downloads/db.sql.gz

    echo "✅ DB-Dump gespeichert: .ddev/.downloads/db.sql.gz"

files_pull_command:
  command: |
    set -eu -o pipefail
    mkdir -p /var/www/html/.ddev/.downloads/files

    APP=$(ssh -o StrictHostKeyChecking=accept-new ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_APP_LABEL}'")

    [ -z "$APP" ] && { echo "❌ TYPO3 App-Container nicht gefunden!"; exit 1; }

    echo "📁 Lade fileadmin von Production (Container: $APP)..."
    # Inhalte von fileadmin/ (ohne den Ordner selbst) → .downloads/files/
    ssh ${COOLIFY_SSH} \
      "docker exec $APP tar czf - -C /var/www/html/public/fileadmin . 2>/dev/null" \
      | tar xzf - -C /var/www/html/.ddev/.downloads/files/

    echo "✅ fileadmin heruntergeladen nach .ddev/.downloads/files/"

db_push_command:
  command: |
    set -eu -o pipefail
    echo ""
    echo "╔══════════════════════════════════════════════════╗"
    echo "║  ⚠️  ACHTUNG: Überschreibt PRODUCTION-Datenbank! ║"
    echo "╚══════════════════════════════════════════════════╝"
    echo "   CTRL+C zum Abbrechen – weiter in 10 Sekunden..."
    sleep 10

    APP=$(ssh -o StrictHostKeyChecking=accept-new ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_APP_LABEL}'")
    DB=$(ssh ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_DB_LABEL}'")
    DB_PASS=$(ssh ${COOLIFY_SSH} \
      "docker exec $APP env" \
      | grep '^TYPO3_DB_PASSWORD=' | cut -d= -f2-)

    [ -z "$DB_PASS" ] && { echo "❌ DB-Passwort nicht gefunden!"; exit 1; }

    echo "📤 Exportiere lokale Datenbank..."
    mysqldump -h db -u db -pdb db 2>/dev/null \
      | gzip > /var/www/html/.ddev/.downloads/db_push.sql.gz

    echo "📥 Importiere in Production-Datenbank..."
    gunzip -c /var/www/html/.ddev/.downloads/db_push.sql.gz \
      | ssh ${COOLIFY_SSH} \
          "docker exec -i -e MYSQL_PWD='$DB_PASS' $DB \
            sh -c 'mariadb -u${COOLIFY_DB_USER} ${COOLIFY_DB_NAME} 2>/dev/null || mysql -u${COOLIFY_DB_USER} ${COOLIFY_DB_NAME}'"

    echo "✅ Production-Datenbank aktualisiert"

files_push_command:
  command: |
    set -eu -o pipefail
    echo ""
    echo "╔══════════════════════════════════════════════════╗"
    echo "║  ⚠️  ACHTUNG: Überschreibt fileadmin auf PROD!   ║"
    echo "╚══════════════════════════════════════════════════╝"
    echo "   CTRL+C zum Abbrechen – weiter in 10 Sekunden..."
    sleep 10

    APP=$(ssh -o StrictHostKeyChecking=accept-new ${COOLIFY_SSH} \
      "docker ps -qf 'label=${COOLIFY_APP_LABEL}'")

    [ -z "$APP" ] && { echo "❌ TYPO3 App-Container nicht gefunden!"; exit 1; }

    echo "📤 Übertrage fileadmin zu Production (Container: $APP)..."
    tar czf - -C /var/www/html/public/fileadmin . \
      | ssh ${COOLIFY_SSH} \
          "docker exec -i $APP tar xzf - -C /var/www/html/public/fileadmin/"

    echo "✅ fileadmin auf Production aktualisiert"
